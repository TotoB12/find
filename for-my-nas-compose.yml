services:
  find:
    image: python:3.12-slim
    container_name: find-app
    restart: unless-stopped

    working_dir: /app

    env_file:
      - .env

    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      DB_PATH: /data/find.sqlite

    ports:
      - "${APP_BIND_IP:?set APP_BIND_IP in .env}:${APP_PORT:-8000}:8000"

    volumes:
      - ./app:/app:ro
      - ./data:/data:rw

    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             exec uvicorn main:app --host 0.0.0.0 --port 8000"

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: find-tunnel
    restart: unless-stopped

    env_file:
      - .env

    command: tunnel --no-autoupdate run

    depends_on:
      find:
        condition: service_healthy
